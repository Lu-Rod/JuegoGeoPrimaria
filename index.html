<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desafío de Banderas</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:'Courier New',monospace;
}

body{
    position:relative;
    overflow:hidden;
    background:#123d20;
    min-height:100vh;
    color:#faf7ea;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:16px;
    background-image:
        linear-gradient(180deg, #1f6b2d 0%, #0f3922 65%, #102e3c 100%),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.08) 0, rgba(255,255,255,0.08) 1px, transparent 1px, transparent 24px),
        repeating-linear-gradient(180deg, rgba(255,255,255,0.08) 0, rgba(255,255,255,0.08) 1px, transparent 1px, transparent 24px),
        radial-gradient(circle at 18% 18%, rgba(255,255,255,0.18), transparent 10%),
        radial-gradient(circle at 82% 25%, rgba(255,255,255,0.16), transparent 9%),
        radial-gradient(circle at 55% 75%, rgba(255,255,255,0.14), transparent 11%);
    background-size: cover, 100% 100%, 100% 100%, 14rem 14rem, 12rem 12rem, 11rem 11rem;
    background-repeat: no-repeat, repeat, repeat, no-repeat, no-repeat, no-repeat;
}

body::before{
    content:'';
    position:absolute;
    inset:0;
    background-image:
        linear-gradient(90deg, transparent 45%, rgba(255,255,255,0.18) 45%, rgba(255,255,255,0.18) 55%, transparent 55%),
        linear-gradient(0deg, transparent 45%, rgba(255,255,255,0.18) 45%, rgba(255,255,255,0.18) 55%, transparent 55%),
        radial-gradient(circle at 10% 10%, rgba(255,255,255,0.2), transparent 6%),
        radial-gradient(circle at 88% 20%, rgba(255,255,255,0.2), transparent 5%),
        radial-gradient(circle at 30% 75%, rgba(255,255,255,0.18), transparent 5%),
        radial-gradient(circle at 70% 75%, rgba(255,255,255,0.18), transparent 5%);
    background-size: 100% 6rem, 6rem 100%, 4rem 4rem, 3.5rem 3.5rem, 4rem 4rem, 3.5rem 3.5rem;
    background-repeat: repeat, repeat, no-repeat, no-repeat, no-repeat, no-repeat;
    opacity:0.47;
    pointer-events:none;
    mix-blend-mode:screen;
}

.screen{
    width:100%;
    max-width:1200px;
    text-align:center;
    border:5px solid #ffe75a;
    border-radius:22px;
    background:radial-gradient(circle at top left, rgba(255,255,255,0.18), transparent 24%),
               linear-gradient(135deg, rgba(35, 82, 28, 0.98), rgba(20, 38, 87, 0.96));
    box-shadow:0 0 0 8px rgba(255,231,109,0.12), 0 20px 45px rgba(0,0,0,0.32);
    padding:28px;
}

.title{
    font-size:2.6rem;
    margin-bottom:12px;
    letter-spacing:0.16rem;
    text-transform:uppercase;
    color:#ffd36d;
    text-shadow:
        0 0 10px rgba(255, 255, 255, 0.85),
        0 0 18px rgba(255, 97, 255, 0.35);
}

.subtitle{
    font-size:1.2rem;
    margin-bottom:18px;
    color:#f7f3ff;
    text-shadow:0 0 6px rgba(255,255,255,0.25);
    line-height:1.6;
}

.play-btn{
    background:linear-gradient(135deg, #ffce47, #ff6f91);
    color:#15141f;
    border:4px solid #fff6a5;
    border-radius:16px;
    padding:14px 36px;
    font-size:1.15rem;
    cursor:pointer;
    font-weight:900;
    letter-spacing:0.08rem;
    text-transform:uppercase;
    box-shadow:0 10px 25px rgba(255, 111, 145, 0.3);
    transition:transform .2s ease, box-shadow .2s ease;
}

.play-btn:hover{
    transform:scale(1.05);
    box-shadow:0 14px 32px rgba(255, 111, 145, 0.45);
}

.counter{
    font-size:1.2rem;
    margin-bottom:12px;
    font-weight:bold;
    color:#120f2f;
    background:linear-gradient(135deg, #fffd8b, #c4ffec);
    border:2px solid rgba(255,255,255,0.7);
    border-radius:16px;
    padding:12px 18px;
    display:inline-block;
    min-width:220px;
    margin:0 6px 12px;
    text-shadow:0 0 2px rgba(255,255,255,0.5);
}

.game-area{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
}

.flags, .countries{
    position:relative;
    background:rgba(255,255,255,0.18);
    border-radius:18px;
    padding:16px;
    border:2px solid rgba(255,255,255,0.45);
    box-shadow:0 10px 30px rgba(255, 231, 109, 0.18);
    overflow:hidden;
}

.flags::before, .countries::before{
    content:'';
    position:absolute;
    inset:0;
    background-image:
        linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255,255,255,0.08) 1px, transparent 1px);
    background-size: 20px 20px, 20px 20px;
    opacity:0.55;
    pointer-events:none;
}

.flags, .countries{
    display:grid;
    gap:12px;
    align-content:start;
}

.flags{
    grid-template-columns:repeat(3,1fr);
    min-height:360px;
    grid-auto-rows:minmax(80px, auto);
}

.countries{
    grid-template-columns:repeat(4,minmax(0,1fr));
    gap:12px;
    min-height:320px;
    grid-auto-rows:minmax(80px, auto);
    padding:14px;
}

.flag{
    width:100%;
    min-height:72px;
    max-height:92px;
    cursor:grab;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:8px 6px;
    border:2px solid rgba(255,255,255,0.8);
    border-radius:18px;
    background:linear-gradient(135deg, rgba(255, 255, 255, 0.22), rgba(255, 183, 76, 0.14));
    box-shadow:0 8px 18px rgba(0, 0, 0, 0.18);
    transition:transform 0.2s ease, box-shadow 0.2s ease;
    overflow:hidden;
    box-sizing:border-box;
}

.flag:active{
    transform:scale(0.98);
}

.flag img{
    max-width:82%;
    max-height:82%;
    width:auto;
    height:auto;
    object-fit:contain;
    border-radius:14px;
    display:block;
}

.country{
    background:#fff4c3;
    color:#1f1630;
    padding:10px 8px;
    margin:0;
    border:2px solid #ff9d76;
    border-radius:18px;
    min-height:90px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:6px;
    font-weight:800;
    font-size:0.95rem;
    line-height:1.2;
    text-align:center;
    box-shadow:0 8px 18px rgba(74, 0, 90, 0.12);
    overflow:hidden;
}


.country img.dropped-flag{
    width:44%;
    max-height:34px;
    object-fit:contain;
    border-radius:6px;
    border:1px solid rgba(0,0,0,0.12);
}

.drag-over{
    background:rgba(255, 255, 255, 0.45) !important;
    box-shadow:0 0 25px rgba(255, 255, 255, 0.5);
}

.hidden{
    display:none;
}

.countries{
    grid-template-columns:repeat(4,minmax(0,1fr));
}

@media(max-width:800px){

.game-area{
    grid-template-columns:1fr;
}

.flag{
    font-size:0.9rem;
}

.flags, .countries{
    grid-template-columns:repeat(2,1fr);
}

.flags{
    grid-template-rows:none;
    min-height:auto;
    max-height:auto;
}

.title{
    font-size:2.2rem;
}

}

</style>
</head>
<body>

<div id="startScreen" class="screen">

    <h1 class="title">🏆 DESAFÍO DE BANDERAS 🏆</h1>

    <div style="font-size:4rem;margin:20px;">
        ⚽ 🌎 🏆
    </div>

    <p class="subtitle">
        ¡Empareja las banderas con sus países!
    </p>

    <p class="subtitle">
        12 países aleatorios por partida
    </p>

    <button class="play-btn" onclick="startGame()">
        ▶ JUGAR
    </button>

</div>

<div id="gameScreen" class="screen hidden">

    <div class="counter" id="counter">
        🌎 Países encontrados: 0 / 12
    </div>
    <div class="counter" id="errorCounter">
        ❌ Errores: 0 / 6
    </div>

    <div class="game-area">

        <div class="flags" id="flagsContainer"></div>

        <div class="countries" id="countriesContainer"></div>

    </div>

</div>

<div id="finalScreen" class="screen hidden">

    <h1 id="finalTitle" class="title">🏆 ¡MAESTRO MUNDIALISTA! 🏆</h1>

    <div id="finalStars" style="font-size:5rem;margin:20px;">
        ⭐⭐⭐⭐⭐
    </div>

    <h2 id="finalMessage">¡Encontraste los 12 países!</h2>

    <br>

    <button class="play-btn" onclick="startGame()">
        JUGAR DE NUEVO
    </button>

</div>

<script>

const countriesPool = [
    {name:"Argentina",code:"ar"},
    {name:"Brasil",code:"br"},
    {name:"Uruguay",code:"uy"},
    {name:"Paraguay",code:"py"},
    {name:"Colombia",code:"co"},
    {name:"Ecuador",code:"ec"},
    {name:"México",code:"mx"},
    {name:"Estados Unidos",code:"us"},
    {name:"Canadá",code:"ca"},
    {name:"Francia",code:"fr"},
    {name:"España",code:"es"},
    {name:"Alemania",code:"de"},
    {name:"Inglaterra",code:"gb-eng"},
    {name:"Escocia",code:"gb-sct"},
    {name:"Portugal",code:"pt"},
    {name:"Bélgica",code:"be"},
    {name:"Países Bajos",code:"nl"},
    {name:"Croacia",code:"hr"},
    {name:"Suiza",code:"ch"},
    {name:"Bosnia y Herzegovina",code:"ba"},
    {name:"Qatar",code:"qa"},
    {name:"Japón",code:"jp"},
    {name:"Corea del Sur",code:"kr"},
    {name:"Australia",code:"au"},
    {name:"Nueva Zelanda",code:"nz"},
    {name:"Marruecos",code:"ma"},
    {name:"Senegal",code:"sn"},
    {name:"Haití",code:"ht"},
    {name:"Turquía",code:"tr"},
    {name:"Curazao",code:"cw"},
    {name:"Austria",code:"at"},
    {name:"Costa de Marfil",code:"ci"},
    {name:"Suecia",code:"se"},
    {name:"Túnez",code:"tn"},
    {name:"Egipto",code:"eg"},
    {name:"Irán",code:"ir"},
    {name:"Arabia Saudita",code:"sa"},
    {name:"Cabo Verde",code:"cv"},
    {name:"Panamá",code:"pa"},
    {name:"Noruega",code:"no"},
    {name:"Argelia",code:"dz"},
    {name:"Sudáfrica",code:"za"},
    {name:"Irak",code:"iq"},
    {name:"Jordania",code:"jo"},
    {name:"RD Congo",code:"cg"},
    {name:"República Checa",code:"cz"},
    {name:"Uzbekistán",code:"uz"},
    {name:"Ghana",code:"gh"}
];

let selectedCountries = [];
let found = 0;
let errors = 0;
const maxErrors = 6;
let matched = new Set();
let misplacedFlags = new Map();
let draggedElement = null;
let draggedSourceBox = null;

function updateCounters(){
    found = matched.size;
    errors = misplacedFlags.size;
    document.getElementById("counter").innerHTML =
        `🌎 Países encontrados: ${found} / 12`;
    document.getElementById("errorCounter").innerHTML =
        `❌ Errores: ${errors} / ${maxErrors}`;
}

function clearPlacement(code, boxCode){
    const pair = code + "|" + boxCode;
    if(matched.has(pair)){
        matched.delete(pair);
    }
    if(misplacedFlags.get(code) === boxCode){
        misplacedFlags.delete(code);
    }
}

function shuffle(array){

for(let i=array.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1));

[array[i],array[j]]=[array[j],array[i]];

}

return array;

}

function startGame(){

found = 0;
errors = 0;
matched.clear();

document.getElementById("startScreen").classList.add("hidden");
document.getElementById("finalScreen").classList.add("hidden");
document.getElementById("gameScreen").classList.remove("hidden");

    document.getElementById("counter").innerHTML =
    "🌎 Países encontrados: 0 / 12";
    document.getElementById("errorCounter").innerHTML =
    "❌ Errores: 0 / 6";

selectedCountries = shuffle([...countriesPool]).slice(0,12);

renderBoard();

}

function renderBoard(){

const flagsContainer =
document.getElementById("flagsContainer");

const countriesContainer =
document.getElementById("countriesContainer");

flagsContainer.innerHTML="";
countriesContainer.innerHTML="";

const shuffledFlags =
shuffle([...selectedCountries]);

const shuffledCountries =
shuffle([...selectedCountries]);

shuffledFlags.forEach(country=>{

const flag=document.createElement("div");

flag.className="flag";
flag.draggable=true;
flag.dataset.code=country.code;

// crear imagen desde flagcdn (SVG)
const img=document.createElement("img");
img.alt=country.name + " flag";
img.src = `https://flagcdn.com/${country.code}.svg`;

flag.appendChild(img);

flag.addEventListener("dragstart",e=>{
    draggedElement = flag;

    // enviamos el código ISO del país
    e.dataTransfer.setData(
    "text",
    country.code
    );

    try{
        e.dataTransfer.setDragImage(img,40,20);
    }catch(err){}

});

flagsContainer.appendChild(flag);

});

shuffledCountries.forEach(country=>{

const box=document.createElement("div");

box.className="country";

box.textContent=country.name;

box.dataset.country=country.name;
box.dataset.code=country.code;

box.addEventListener("dragover",e=>{
    e.preventDefault();
    box.classList.add("drag-over");
});

box.addEventListener("dragleave",()=>{
    box.classList.remove("drag-over");
});

box.addEventListener("dragstart",e=>{
    const targetFlag = box.querySelector(".flag");
    if(targetFlag){
        draggedElement = targetFlag;
        const flagCode = targetFlag.dataset.code || country.code;
        const targetImg = targetFlag.querySelector("img");
        if(targetImg){
            e.dataTransfer.setDragImage(targetImg, 40, 20);
        }
        e.dataTransfer.setData("text", flagCode);
    }
});

box.addEventListener("drop",e=>{

    e.preventDefault();

    box.classList.remove("drag-over");

    const draggedCode =
        (draggedElement && draggedElement.dataset && draggedElement.dataset.code)
        || e.dataTransfer.getData("text/plain")
        || e.dataTransfer.getData("text");

    const pair = draggedCode + "|" + country.code;

    // Si ya hay bandera en esta caja, eliminamos la anterior
    const existingFlag = box.querySelector(".flag");
    if(existingFlag){
        const previousCode = existingFlag.dataset.code;
        clearPlacement(previousCode, country.code);
        existingFlag.remove();
    }

    // Mover la bandera original desde su origen al cuadro destino
    if(draggedElement){
        if(draggedElement.parentElement && draggedElement.parentElement !== box){
            draggedElement.parentElement.removeChild(draggedElement);
        }
        box.appendChild(draggedElement);
    }

    if(draggedCode === country.code){
        matched.add(pair);
    } else {
        misplacedFlags.set(draggedCode, country.code);
    }

    updateCounters();

    if(found === 12){
        setTimeout(()=>{
            document
                .getElementById("gameScreen")
                .classList.add("hidden");
            document
                .getElementById("finalTitle")
                .textContent = "🏆 ¡MAESTRO DE BANDERAS! 🏆";
            document
                .getElementById("finalStars")
                .textContent = "⭐⭐⭐⭐⭐";
            document
                .getElementById("finalMessage")
                .textContent = "¡Encontraste los 12 países!";
            document
                .getElementById("finalScreen")
                .classList.remove("hidden");
        },500);
    }

    if(errors >= maxErrors){
        setTimeout(()=>{
            document
                .getElementById("gameScreen")
                .classList.add("hidden");
            document
                .getElementById("finalTitle")
                .textContent = "game over";
            document
                .getElementById("finalStars")
                .textContent = "💀";
            document
                .getElementById("finalMessage")
                .textContent = "Has alcanzado el máximo de errores.";
            document
                .getElementById("finalScreen")
                .classList.remove("hidden");
        }, 200);
    }

});

countriesContainer.appendChild(box);

});

}

</script>

</body>
</html>
